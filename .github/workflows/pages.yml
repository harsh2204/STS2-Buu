# Regenerates docs/data.json + docs/assets in CI (those paths are gitignored).
# Commit only docs source: build_data.py, index.html, styles/scripts, etc.
# Repo Settings → Pages → Source = "GitHub Actions".

name: Pages

on:
  push:
    branches:
      - main
    paths:
      - "Buu/**"
      - "BuuCode/**"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate catalog and copy images
        run: python docs/build_data.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
